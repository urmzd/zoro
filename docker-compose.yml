services:
  surrealdb:
    image: surrealdb/surrealdb:latest
    command: start --user root --pass root file:/data/zoro.db
    ports:
      - "8000:8000"
    volumes:
      - zoro-data:/data

  searxng:
    image: searxng/searxng:latest
    ports:
      - "8888:8080"
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro

volumes:
  zoro-data:

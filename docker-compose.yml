services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: zoro
      POSTGRES_PASSWORD: zoro
      POSTGRES_DB: zoro
    ports:
      - "5432:5432"
    volumes:
      - zoro-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zoro"]
      interval: 10s
      timeout: 5s
      retries: 5

  searxng:
    image: searxng/searxng:latest
    ports:
      - "8888:8080"
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  zoro-pgdata:

name: CI
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: API
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: api/go.mod
          cache-dependency-path: api/go.sum

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...

  generate:
    name: Generate API Client
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install oag
        run: curl -fsSL https://raw.githubusercontent.com/urmzd/openapi-generator/main/install.sh | sh

      - name: Generate
        run: oag generate

      - name: Check for uncommitted changes
        run: git diff --exit-code frontend/src/generated/

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npx biome check .

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npx next build

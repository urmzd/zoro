name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force:
        description: "Re-release the current tag"
        type: boolean
        default: false

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  release:
    name: Release
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.SR_RELEASER_APP_ID }}
          private-key: ${{ secrets.SR_RELEASER_PRIVATE_KEY }}
          repositories: ${{ github.event.repository.name }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: urmzd/sr@v3
        id: sr
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          force: ${{ inputs.force || false }}
          build-command: |
            mkdir -p dist
            for os in linux darwin; do
              for arch in amd64 arm64; do
                echo "Building zoro-${os}-${arch}..."
                CGO_ENABLED=0 GOOS=$os GOARCH=$arch go build \
                  -ldflags "-s -w -X main.version=${SR_VERSION}" \
                  -o "dist/zoro-${os}-${arch}" .
              done
            done
          artifacts: dist/*

    outputs:
      released: ${{ steps.sr.outputs.released }}
      tag: ${{ steps.sr.outputs.tag }}

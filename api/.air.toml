root = "."
tmp_dir = "tmp"

[build]
  cmd = "swag init -g cmd/zoro/main.go -o docs --parseDependency --parseInternal && go build -o ./tmp/zoro ./cmd/zoro"
  bin = "./tmp/zoro"
  include_ext = ["go"]
  exclude_dir = ["tmp", "vendor", "docs"]
  delay = 1000

[log]
  time = false

[misc]
  clean_on_exit = true

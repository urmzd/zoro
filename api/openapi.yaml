openapi: "3.1.0"
info:
  title: Zoro API
  version: "1.0.0"
  description: AI research assistant with knowledge graph and web search

servers:
  - url: http://localhost:8080
    description: Local development

paths:
  /api/sessions:
    post:
      operationId: createSession
      summary: Create a new chat session
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatSession"

    get:
      operationId: listSessions
      summary: List all chat sessions
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatSessionSummary"

  /api/sessions/search:
    get:
      operationId: searchSessions
      summary: Search chat sessions
      parameters:
        - name: q
          in: query
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatSessionSummary"

  /api/sessions/{id}:
    get:
      operationId: getSession
      summary: Get a chat session by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatSession"
        "404":
          description: Not found

  /api/sessions/{id}/messages:
    post:
      operationId: sendMessage
      summary: Send a message and receive SSE stream
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageRequest"
      responses:
        "200":
          description: SSE event stream
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/SSEEvent"

  /api/research:
    post:
      operationId: startResearch
      summary: Start a research session and receive SSE stream
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartResearchRequest"
      responses:
        "200":
          description: SSE event stream
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/SSEEvent"

  /api/knowledge/search:
    get:
      operationId: searchKnowledge
      summary: Search the knowledge graph
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchFactsResponse"

  /api/knowledge/graph:
    get:
      operationId: getKnowledgeGraph
      summary: Get knowledge graph data
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 300
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GraphData"

  /api/knowledge/nodes/{id}:
    get:
      operationId: getNodeDetail
      summary: Get node detail with neighbors
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: depth
          in: query
          schema:
            type: integer
            default: 1
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NodeDetail"
        "404":
          description: Not found

  /api/intent/classify:
    post:
      operationId: classifyIntent
      summary: Classify user intent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClassifyIntentRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntentResponse"

  /api/autocomplete:
    get:
      operationId: getAutocomplete
      summary: Get autocomplete suggestions
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutocompleteResponse"

components:
  schemas:
    ChatSession:
      type: object
      required: [id, messages, created_at]
      properties:
        id:
          type: string
        messages:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"
        created_at:
          type: string
          format: date-time

    ChatMessage:
      type: object
      required: [role, content]
      properties:
        role:
          type: string
          enum: [user, assistant, tool]
        content:
          type: string
        toolCalls:
          type: array
          items:
            $ref: "#/components/schemas/ToolCall"

    ToolCall:
      type: object
      required: [id, name, arguments]
      properties:
        id:
          type: string
        name:
          type: string
        arguments:
          type: string
        result:
          type: string

    ChatSessionSummary:
      type: object
      required: [id, preview, message_count, created_at]
      properties:
        id:
          type: string
        preview:
          type: string
        message_count:
          type: integer
        created_at:
          type: string
          format: date-time

    Entity:
      type: object
      required: [uuid, name, type, summary]
      properties:
        uuid:
          type: string
        name:
          type: string
        type:
          type: string
        summary:
          type: string

    Relation:
      type: object
      required: [uuid, source_uuid, target_uuid, type, fact]
      properties:
        uuid:
          type: string
        source_uuid:
          type: string
        target_uuid:
          type: string
        type:
          type: string
        fact:
          type: string

    Fact:
      type: object
      required: [uuid, name, fact, source_node, target_node]
      properties:
        uuid:
          type: string
        name:
          type: string
        fact:
          type: string
        source_node:
          $ref: "#/components/schemas/Entity"
        target_node:
          $ref: "#/components/schemas/Entity"

    SearchFactsResponse:
      type: object
      required: [facts]
      properties:
        facts:
          type: array
          items:
            $ref: "#/components/schemas/Fact"

    GraphData:
      type: object
      required: [nodes, edges]
      properties:
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/GraphNode"
        edges:
          type: array
          items:
            $ref: "#/components/schemas/GraphEdge"

    GraphNode:
      type: object
      required: [id, name, type]
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
        summary:
          type: string

    GraphEdge:
      type: object
      required: [id, source, target, type, weight]
      properties:
        id:
          type: string
        source:
          type: string
        target:
          type: string
        type:
          type: string
        fact:
          type: string
        weight:
          type: number

    NodeDetail:
      type: object
      required: [node, neighbors, edges]
      properties:
        node:
          $ref: "#/components/schemas/GraphNode"
        neighbors:
          type: array
          items:
            $ref: "#/components/schemas/GraphNode"
        edges:
          type: array
          items:
            $ref: "#/components/schemas/GraphEdge"

    ResearchSession:
      type: object
      required: [id, query, status, results, entities, relations, timeline, summary, created_at]
      properties:
        id:
          type: string
        query:
          type: string
        status:
          type: string
        results:
          type: array
          items:
            $ref: "#/components/schemas/SearchResult"
        entities:
          type: array
          items:
            $ref: "#/components/schemas/Entity"
        relations:
          type: array
          items:
            $ref: "#/components/schemas/Relation"
        timeline:
          type: array
          items:
            $ref: "#/components/schemas/TimelineEvent"
        summary:
          type: string
        created_at:
          type: string
          format: date-time

    SearchResult:
      type: object
      required: [title, url, snippet]
      properties:
        title:
          type: string
        url:
          type: string
        snippet:
          type: string

    TimelineEvent:
      type: object
      required: [type, message, timestamp]
      properties:
        type:
          type: string
        message:
          type: string
        timestamp:
          type: string
          format: date-time
        data: {}

    IntentResponse:
      type: object
      required: [action, query]
      properties:
        action:
          type: string
          enum: [chat, knowledge_search]
        query:
          type: string

    AutocompleteResponse:
      type: object
      required: [suggestions]
      properties:
        suggestions:
          type: array
          items:
            type: string

    SSEEvent:
      type: object
      required: [type, data]
      properties:
        type:
          type: string
          enum:
            - text_delta
            - tool_call_start
            - tool_call_result
            - done
            - error
            - search_started
            - search_results
            - episode_ingested
            - entity_discovered
            - relation_found
            - prior_knowledge
            - graph_ready
            - summary_token
            - research_complete
        data: {}

    SendMessageRequest:
      type: object
      required: [content]
      properties:
        content:
          type: string

    StartResearchRequest:
      type: object
      required: [query]
      properties:
        query:
          type: string

    ClassifyIntentRequest:
      type: object
      required: [query]
      properties:
        query:
          type: string

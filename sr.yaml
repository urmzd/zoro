branches: [main]
tag_prefix: "v"
floating_tags: true

types:
  - name: feat
    bump: minor
    section: Features
  - name: fix
    bump: patch
    section: Bug Fixes
  - name: perf
    bump: patch
    section: Performance
  - name: docs
    section: Documentation
  - name: refactor
    bump: patch
    section: Refactoring
  - name: revert
    section: Reverts
  - name: chore
  - name: ci
  - name: test
  - name: build
  - name: style

changelog:
  file: CHANGELOG.md

hooks:
  commit-msg:
    - sr hook commit-msg
